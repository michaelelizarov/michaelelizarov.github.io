<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-lang-key="trainee_communication_page_title">תקשורת צוותית - פלטפורמת סימולציות סייבר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
</head>
<body class="body-dashboard-layout bg-body-bg text-text-color transition-colors duration-300" data-user-type="trainee_general"> <div id="sidebar-placeholder"></div>
    <main class="main-content-area">
        <header class="mb-6">
            <h2 data-lang-key="communication_header" class="text-3xl font-bold text-header">כלי תקשורת</h2>
            <p data-lang-key="communication_subtitle" class="text-subtitle mt-1 text-base">תקשר עם חברי הצוות שלך ועם המדריך במהלך התרחיש.</p>
        </header>
        <div class="communication-layout-grid card rounded-xl shadow-lg overflow-hidden">
            <aside class="chat-sidebar p-0 border-gray-200 dark:border-gray-700 rtl:border-l ltr:border-r">
                <div class="p-4 border-b border-[var(--card-border-color)]">
                    <input type="search" id="chat-search-contacts" class="form-input w-full text-sm" placeholder="חפש אנשי קשר/ערוצים...">
                </div>
                <div class="chat-sidebar-scrollable max-h-[calc(100vh-300px)] overflow-y-auto">
                    <section class="p-3">
                        <h3 data-lang-key="channels_list_header" class="text-xs font-semibold uppercase text-subtitle mb-2 px-1">ערוצים</h3>
                        <ul id="channels-list" class="space-y-0.5">
                            <li class="text-xs text-subtitle px-3 py-1.5" data-lang-key="no_channels_available">[טוען ערוצים...]</li>
                            </ul>
                    </section>
                    <section class="p-3 mt-2">
                        <h3 data-lang-key="direct_messages_list_header" class="text-xs font-semibold uppercase text-subtitle mb-2 px-1">הודעות ישירות</h3>
                        <ul id="direct-messages-list" class="space-y-0.5">
                             <li class="text-xs text-subtitle px-3 py-1.5" data-lang-key="no_direct_messages_available">[טוען אנשי קשר...]</li>
                            </ul>
                    </section>
                </div>
            </aside>
            <div class="chat-main-area flex flex-col">
                <header class="chat-header p-3 sm:p-4 border-b border-[var(--card-border-color)] flex justify-between items-center">
                    <h3 id="active-chat-title" class="text-lg font-semibold text-header truncate">[בחר שיחה]</h3>
                    <div class="flex items-center gap-2">
                        <button id="voice-call-btn" type="button" class="btn btn-icon btn-ghost" data-lang-key-title="start_voice_call_button_tooltip" title="התחל שיחת קול">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.308 1.154a11.031 11.031 0 005.569 5.569l1.154-2.308a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        </button>
                        <button id="video-call-btn" type="button" class="btn btn-icon btn-ghost" data-lang-key-title="start_video_call_button_tooltip" title="התחל שיחת וידאו">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M4 6h8M4 10h8M4 14h8M4 18h8"></path></svg>
                        </button>
                        </div>
                </header>
                <div id="chat-messages-container" class="chat-messages-scrollable flex-grow p-4 space-y-4 overflow-y-auto">
                    <p id="no-messages-in-chat" class="text-center text-subtitle py-8" data-lang-key="no_messages_in_chat">אין הודעות בשיחה זו עדיין. התחל את השיחה!</p>
                    </div>
                <div class="chat-input-area p-3 sm:p-4 border-t border-[var(--card-border-color)]">
                    <form id="chat-form" class="flex items-center gap-2">
                        <input type="text" id="chat-input" class="form-input flex-grow text-sm" data-lang-key-placeholder="chat_input_placeholder" placeholder="הקלד את הודעתך כאן..." autocomplete="off">
                        <button id="send-chat-message-btn" type="submit" class="btn btn-primary btn-icon" data-lang-key-title="send_chat_message_button_tooltip" title="שלח הודעה">
                            <svg class="w-5 h-5 transform rtl:rotate-0" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 16.571V11a1 1 0 112 0v5.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div class="mt-10 flex flex-col sm:flex-row justify-between items-center gap-4">
            <button type="button" id="prev-dashboard-button" class="btn btn-neutral w-full sm:w-auto">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 rtl:mr-2 ltr:ml-2 transform rtl:rotate-180">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
                <span data-lang-key="go_back_to_questions">חזור לשאלות מנחות</span>
            </button>
            <button type="button" id="next-dashboard-button" class="btn btn-primary w-full sm:w-auto">
                <span data-lang-key="go_to_ai_assistant_from_chat">המשך לעוזר AI</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 rtl:ml-2 ltr:mr-2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                </svg>
            </button>
        </div>
        <footer class="text-center py-8 text-sm text-subtitle opacity-70 mt-auto">
            <p>&copy; <span id="currentYear"></span> Cyber Simulation Platform. All rights reserved.</p>
        </footer>
    </main>
    <script src="app-global.js" defer></script>
    <script src="sidebar.js" defer></script>
    <script src="trainee_communication_translations.js" defer></script>
    <script src="trainee_communication.js" defer></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let currentUserType = urlParams.get('userType') || localStorage.getItem('currentUserType') || 'trainee_general';
        document.body.dataset.userType = currentUserType;
        document.addEventListener('DOMContentLoaded', () => {
            const yearEl = document.getElementById('currentYear');
            if(yearEl) { yearEl.textContent = new Date().getFullYear(); }
            if (typeof window.renderDynamicSidebar === 'function') {
                window.renderDynamicSidebar();
            }
            const prevButton = document.getElementById('prev-dashboard-button');
            if(prevButton) {
                prevButton.addEventListener('click', () => {
                    window.location.href = 'trainee_questions.html';
                });
            }
            const nextButton = document.getElementById('next-dashboard-button');
            if(nextButton) {
                nextButton.addEventListener('click', () => {
                    window.location.href = 'trainee_ai_assistant.html';
                });
            }
            const chatInput = document.getElementById('chat-input');
            const chatForm = document.getElementById('chat-form');
            const chatMessagesContainerEl = document.getElementById('chat-messages-container');
            const noMessagesInChatEl = document.getElementById('no-messages-in-chat');

            if (chatForm) {
                chatForm.addEventListener('submit', (event) => {
                    event.preventDefault();
                    const messageText = chatInput.value.trim();
                    if (messageText) {
                        const newMessage = {
                            chatId: 'current', // Assuming a current chat context
                            senderId: 'currentUser',
                            text: messageText,
                            timestamp: new Date().toISOString()
                        };
                        // Mock adding message to chat
                        const div = document.createElement('div');
                        div.className = 'chat-message sent';
                        div.innerHTML = `
                            <div class="message-bubble">
                                <div class="message-text">${messageText}</div>
                                <div class="message-timestamp">${new Date().toLocaleTimeString()}</div>
                            </div>
                        `;
                        chatMessagesContainerEl.appendChild(div);
                        chatMessagesContainerEl.scrollTop = chatMessagesContainerEl.scrollHeight;
                        chatInput.value = '';
                        noMessagesInChatEl.classList.add('hidden');
                    }
                });
            }
        });
    </script>
    <style>
        /* Align chat messages based on language direction */
        .chat-message.sent {
            text-align: right;
        }
        .chat-message.received {
            text-align: left;
        }
        /* Adjust send icon direction */
        .btn-icon svg {
            transform: rotate(90deg);
        }
    </style>
</body>
</html>
